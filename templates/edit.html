<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>
</head>
<body>
    <style>body {
    font-family: Arial, sans-serif;
    background-color: #f5f1ea;
    margin: 0;
    padding: 0;
}

/* Header */
h1 {
    text-align: center;
    padding: 20px;
    background-color: #6f4e37;
    color: white;
    margin: 0;
}

/* Container */
.container {
    width: 90%;
    margin: auto;
}

/* Card */
.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    margin: 15px;
    display: inline-block;
    width: 220px;
    vertical-align: top;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* Button */
.btn {
    display: inline-block;
    padding: 6px 10px;
    margin: 5px 2px;
    text-decoration: none;
    border-radius: 5px;
    color: white;
}

.btn-add {
    background-color: #8b5e3c;
}

.btn-edit {
    background-color: #4CAF50;
}

.btn-delete {
    background-color: #e74c3c;
}

/* Form */
form {
    width: 300px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
}

button {
    width: 100%;
    padding: 10px;
    background-color: #6f4e37;
    color: white;
    border: none;
    border-radius: 5px;
}</style>
    <h1>Edit Product</h1>

    <form method="POST">
        Name: <input type="text" name="name" value="{{ item.name }}"><br>
        Price: <input type="number" name="price" value="{{ item.price }}"><br>
        Image URL: <input type="text" name="image" value="{{ item.image }}"><br>
        Stock: <input type="number" name="stock" value="{{ item.stock }}"><br>

        Category:
        <select name="category_id">
            {% for c in categories %}
                <option value="{{ c.id }}"
                {% if c.id == item.category_id %}selected{% endif %}>
                    {{ c.name }}
                </option>
            {% endfor %}
        </select><br><br>

        <button type="submit">Update</button>
    </form>

    <a href="/">⬅ Back</a>
</body>
</html>
